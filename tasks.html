<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Management</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header class="topbar">
        <h1>Task Management Dashboard</h1>
        <div class="topbar-right">
            <span>Welcome, {{ username }}</span>
            <a href="{{ url_for('logout') }}" class="btn btn-secondary">Logout</a>
        </div>
    </header>

    <main class="container">

        <div class="actions-bar">
            <button id="openModalBtn" class="btn btn-primary">+ Add Task</button>
        </div>

        <div id="messageBox" class="alert" style="display:none;"></div>

        <table class="task-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Employee ID</th>
                    <th>Employee Name</th>
                    <th>Task Title</th>
                    <th>Completed</th>
                    <th>Created At</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="taskTableBody">
                <!-- Rows injected by script.js -->
            </tbody>
        </table>

        <p id="emptyState" style="display:none;">No tasks found. Add one to get started.</p>
    </main>

    <!-- Popup Modal -->
    <div id="taskModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h2>Add New Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label for="employee_id">Employee ID</label>
                    <input type="text" id="employee_id" name="employee_id" required>
                </div>

                <div class="form-group">
                    <label for="employee_name">Employee Name</label>
                    <input type="text" id="employee_name" name="employee_name" required>
                </div>

                <div class="form-group">
                    <label for="task_title">Task Title</label>
                    <input type="text" id="task_title" name="task_title" required>
                </div>

                <div class="form-group">
                    <label for="completed">Completed</label>
                    <select id="completed" name="completed">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button type="button" id="cancelModalBtn" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
